<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VoiceKB</title>
<style>
/* ===== Design Tokens — 从 hotel_shop 设计系统继承 ===== */
:root {
  /* 品牌色（VoiceKB 靛蓝主题） */
  --color-primary: #4F46E5;
  --color-primary-dark: #3730A3;
  --color-primary-light: #EEF2FF;
  /* 功能色（与 hotel_shop 统一） */
  --color-success: #00B578;
  --color-warning: #FF8F1F;
  --color-info: #1677FF;
  --color-danger: #FF3B30;
  /* 中性色（与 hotel_shop 完全一致） */
  --color-text-primary: #1D2129;
  --color-text-secondary: #4E5969;
  --color-text-tertiary: #86909C;
  --color-text-disabled: #C9CDD4;
  --color-border: #E5E6EB;
  --color-bg-page: #F7F8FA;
  --color-bg-card: #FFFFFF;
  --color-bg-hover: #F2F3F5;
  /* 阴影（与 hotel_shop 一致） */
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
  /* 圆角（与 hotel_shop 一致） */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-full: 999px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden; /* 禁止 body 滚动，防止 Chrome 地址栏跳动 */
}
body {
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  background: var(--color-bg-page); color: var(--color-text-primary);
  font-size: 14px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  display: flex; flex-direction: column;
}
a { color: var(--color-primary); text-decoration: none; }

/* ===== Utilities ===== */
.hidden { display: none !important; }

/* ===== Top Nav ===== */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--color-bg-card); border-bottom: 1px solid var(--color-border);
  padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
}
.top-nav h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.top-nav h1 span { color: var(--color-primary); }

/* ===== Bottom Tab Bar ===== */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--color-bg-card); border-top: 1px solid var(--color-border);
  display: flex; padding: 4px 0 calc(4px + var(--safe-bottom));
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 4px 0; cursor: pointer; border: none; background: none;
  font-size: 10px; font-weight: 500; color: var(--color-text-tertiary); transition: color 0.15s;
}
.tab-item.active { color: var(--color-primary); font-weight: 600; }
.tab-item svg { width: 22px; height: 22px; margin-bottom: 2px; }

/* ===== View — 内部滚动容器，防止 Chrome 地址栏跳动 ===== */
.view-container {
  flex: 1; overflow: hidden; position: relative;
}
.view {
  display: none; padding: 8px 0;
  position: absolute; inset: 0;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain; /* 防止滚动穿透和下拉刷新 */
  padding-bottom: calc(56px + var(--safe-bottom));
}
.view.active { display: block; }

/* ===== Card — 继承 hotel_shop product-card 规范 ===== */
.card {
  background: var(--color-bg-card); border-radius: var(--radius-xl);
  padding: 14px 16px; margin: 0 12px 10px;
  box-shadow: var(--shadow-md); transition: box-shadow 0.2s;
}
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--color-text-primary); }
.card-meta { font-size: 12px; color: var(--color-text-tertiary); }

/* ===== Recording Card — 继承 product-card 结构 ===== */
.rec-card { cursor: pointer; transition: box-shadow 0.2s; }
.rec-card:active { box-shadow: var(--shadow-lg); }
.rec-header { display: flex; align-items: center; gap: 12px; }
.rec-icon {
  width: 44px; height: 44px; border-radius: var(--radius-lg);
  background: var(--color-primary-light); display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; border: 1px solid var(--color-border);
}
.rec-icon svg { width: 20px; height: 20px; color: var(--color-primary); }
.rec-info { flex: 1; min-width: 0; }
.rec-name { font-size: 15px; font-weight: 600; color: var(--color-text-primary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.rec-meta { font-size: 12px; color: var(--color-text-tertiary); margin-top: 2px; }
.rec-speakers { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
/* speaker-tag — 继承 product-tag + order-badge 规范 */
.speaker-tag {
  display: inline-flex; align-items: center; gap: 4px;
  height: 22px; padding: 0 8px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
  background: var(--color-primary-light); color: var(--color-primary-dark);
  cursor: pointer; border: none;
}
.speaker-tag:nth-child(2) { background: #FFF3E0; color: #E65100; }
.speaker-tag:nth-child(3) { background: #E8F5E9; color: #00B578; }
.speaker-tag:nth-child(4) { background: #FCE7F3; color: #DB2777; }
/* rec-status — 继承 order-badge 规范 */
.rec-status {
  display: inline-flex; align-items: center; gap: 3px;
  height: 22px; padding: 0 8px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 500;
}
.rec-status.completed { background: #E8F5E9; color: #00B578; }
.rec-status.processing { background: #FFF3E0; color: #FF8F1F; }
.rec-status.failed { background: #FFEBEE; color: #FF3B30; }

/* ── Empty State ───────────────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 60px 32px;
}
.empty-state svg { width: 120px; height: 120px; color: var(--color-text-tertiary); opacity: 0.3; margin-bottom: 20px; }
.empty-state h3 { font-size: 18px; color: var(--color-text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: var(--color-text-tertiary); margin-bottom: 24px; }

/* ===== Buttons — 继承 hotel_shop btn 规范 ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 40px; padding: 0 20px; border-radius: var(--radius-lg); font-size: 14px;
  font-weight: 500; border: none; cursor: pointer;
  transition: opacity 0.15s, box-shadow 0.15s; white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(180deg, #6366F1 0%, #4F46E5 100%);
  color: #fff; box-shadow: 0 2px 8px rgba(79,70,229,0.3);
}
.btn-primary:active { opacity: 0.88; }
.btn-outline { background: #fff; color: var(--color-primary-dark); border: 1.5px solid var(--color-primary); }
.btn-outline:active { background: var(--color-primary-light); }
.btn-sm { height: 32px; padding: 0 14px; font-size: 13px; border-radius: var(--radius-md); }
.btn-block { width: 100%; }
.btn-fab {
  position: fixed; right: 16px; bottom: calc(68px + var(--safe-bottom));
  width: 52px; height: 52px; border-radius: 50%; z-index: 90;
  box-shadow: 0 4px 16px rgba(79,70,229,0.35); padding: 0;
}
.btn-fab svg { width: 22px; height: 22px; }

/* ── Upload ────────────────────────────────────────────────────────── */
.upload-zone {
  border: 2px dashed var(--color-border); border-radius: var(--radius-md);
  padding: 40px 20px; text-align: center; margin: 16px;
  transition: border-color 0.2s, background 0.2s;
}
.upload-zone.dragover { border-color: var(--color-primary); background: var(--color-primary-light); }
.upload-zone svg { width: 48px; height: 48px; color: var(--color-primary); margin-bottom: 12px; }
.upload-zone p { font-size: 14px; color: var(--color-text-secondary); }
/* fileInput hidden via inline style */

/* ── Progress ──────────────────────────────────────────────────────── */
.progress-container { margin: 16px; }
.progress-bar-bg {
  width: 100%; height: 8px; background: #E5E7EB; border-radius: 4px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--color-primary), #818CF8);
  border-radius: 4px; transition: width 0.3s ease;
}
.progress-text { font-size: 13px; color: var(--color-text-secondary); margin-top: 8px; text-align: center; }

/* ── Detail View ───────────────────────────────────────────────────── */
.detail-header { padding: 16px; }
.detail-back { display: flex; align-items: center; gap: 4px; font-size: 14px; color: var(--color-primary); cursor: pointer; margin-bottom: 12px; }
.detail-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; word-break: break-all; }
.detail-meta { font-size: 13px; color: var(--color-text-tertiary); }

.summary-card {
  background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
  border-radius: var(--radius-md); padding: 16px; margin: 0 16px 12px;
}
.summary-card h4 { font-size: 14px; font-weight: 600; color: var(--color-primary-dark); margin-bottom: 8px; }
.summary-card .summary-text { font-size: 13px; color: var(--color-text-secondary); line-height: 1.7; white-space: pre-wrap; }

.transcript {
  padding: 0 16px;
}
.transcript-item {
  display: flex; gap: 10px; margin-bottom: 16px;
}
.transcript-avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff;
}
.transcript-bubble { flex: 1; }
.transcript-speaker {
  font-size: 12px; font-weight: 600; margin-bottom: 2px;
  display: flex; align-items: center; gap: 6px;
}
.transcript-speaker .ts { font-weight: 400; color: var(--color-text-tertiary); font-size: 11px; }
.transcript-text { font-size: 14px; color: var(--color-text-primary); line-height: 1.7; font-weight: 400; }

/* Speaker colors */
.spk-0 { background: var(--color-primary); }
.spk-1 { background: #D97706; }
.spk-2 { background: #059669; }
.spk-3 { background: #DB2777; }
.spk-4 { background: #7C3AED; }

/* ===== Filter Bar — 分类筛选 ===== */
.filter-bar {
  display: flex; gap: 8px; padding: 0 12px 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; height: 30px; padding: 0 14px;
  border-radius: var(--radius-full); font-size: 13px; font-weight: 500;
  border: 1.5px solid var(--color-border); background: var(--color-bg-card);
  color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.filter-chip.active {
  background: var(--color-primary); color: #fff;
  border-color: var(--color-primary); box-shadow: 0 2px 8px rgba(79,70,229,0.2);
}
.category-tag {
  display: inline-flex; align-items: center; height: 20px; padding: 0 8px;
  border-radius: var(--radius-sm); font-size: 11px; font-weight: 500;
  background: #E3F2FD; color: #1677FF;
}

/* ===== Prompt Editor ===== */
.prompt-editor {
  min-height: 100px; padding: 10px 12px; font-size: 13px; line-height: 1.8;
  border: 1.5px solid var(--color-border); border-radius: var(--radius-lg);
  background: var(--color-bg-card); color: var(--color-text-primary);
  outline: none; white-space: pre-wrap; word-break: break-word;
}
.prompt-editor:focus { border-color: var(--color-primary); }
.prompt-editor:empty::before {
  content: attr(data-placeholder); color: var(--color-text-disabled);
}
.var-chip {
  display: inline-block; padding: 1px 8px; margin: 0 2px;
  background: var(--color-primary-light); color: var(--color-primary-dark);
  border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
  vertical-align: baseline; user-select: all; cursor: default;
}
.var-dropdown {
  position: absolute; background: var(--color-bg-card); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); z-index: 300;
  min-width: 140px; overflow: hidden;
}
.var-dropdown-item {
  padding: 10px 14px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
}
.var-dropdown-item:active, .var-dropdown-item:hover { background: var(--color-bg-hover); }
.var-dropdown-item .var-label { color: var(--color-text-primary); }
.var-dropdown-item .var-desc { font-size: 11px; color: var(--color-text-tertiary); }

/* ===== Search — 继承 hotel_shop input 规范 ===== */
.search-bar {
  display: flex; gap: 8px; padding: 0 12px; margin-bottom: 8px;
}
.search-input {
  flex: 1; height: 44px; padding: 0 14px;
  background: var(--color-bg-hover); border: 1.5px solid transparent;
  border-radius: var(--radius-lg); font-size: 14px; color: var(--color-text-primary);
  outline: none; transition: border-color 0.15s, background 0.15s; font-family: inherit;
}
.search-input::placeholder { color: var(--color-text-disabled); }
.search-input:focus { border-color: var(--color-primary); background: #fff; }
.search-result-item {
  padding: 12px 16px; border-bottom: 1px solid var(--color-border); cursor: pointer;
  transition: background 0.15s;
}
.search-result-item:active { background: var(--color-bg-hover); }
.search-highlight { background: #FFF3E0; padding: 1px 3px; border-radius: 2px; font-weight: 500; }

/* ===== Chat ===== */
.chat-messages { padding: 12px; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#viewChat.active { display: flex; flex-direction: column; }
.chat-msg { margin-bottom: 14px; }
.chat-msg.user { text-align: right; }
.chat-msg .bubble {
  display: inline-block; max-width: 82%; padding: 10px 14px;
  border-radius: var(--radius-xl); font-size: 14px; line-height: 1.6; text-align: left;
}
.chat-msg.user .bubble { background: linear-gradient(180deg, #6366F1, #4F46E5); color: #fff; border-bottom-right-radius: var(--radius-sm); }
.chat-msg.ai .bubble { background: var(--color-bg-card); border: 1px solid var(--color-border); border-bottom-left-radius: var(--radius-sm); box-shadow: var(--shadow-sm); }
.chat-msg.ai .bubble .source-link { font-size: 12px; color: var(--color-primary); margin-top: 6px; display: block; }
.chat-input-bar {
  position: sticky; bottom: 0;
  left: 0; right: 0; padding: 8px 12px;
  background: var(--color-bg-card); border-top: 1px solid var(--color-border);
  display: flex; gap: 8px; z-index: 10;
}
.chat-input {
  flex: 1; height: 44px; padding: 0 14px;
  background: var(--color-bg-hover); border: 1.5px solid transparent;
  border-radius: var(--radius-full); font-size: 14px; outline: none;
  font-family: inherit; color: var(--color-text-primary);
}
.chat-input::placeholder { color: var(--color-text-disabled); }
.chat-input:focus { border-color: var(--color-primary); background: #fff; }
.chat-send {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: linear-gradient(180deg, #6366F1, #4F46E5); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(79,70,229,0.3); flex-shrink: 0;
}
.typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
.typing-indicator span {
  width: 6px; height: 6px; background: var(--color-text-tertiary);
  border-radius: 50%; animation: typing 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

/* ── Toast ─────────────────────────────────────────────────────────── */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: var(--color-text-primary); color: #fff; padding: 10px 20px;
  border-radius: var(--radius-lg); font-size: 14px; z-index: 999;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* ── Modal ─────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
}
.modal-sheet {
  background: var(--color-bg-card); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  padding: 20px 16px calc(20px + var(--safe-bottom)); width: 100%;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--color-text-primary); }
.modal-input {
  width: 100%; height: 44px; padding: 0 14px;
  background: var(--color-bg-hover); border: 1.5px solid transparent;
  border-radius: var(--radius-lg); font-size: 14px; outline: none; margin-bottom: 16px;
  font-family: inherit; color: var(--color-text-primary);
}
.modal-input::placeholder { color: var(--color-text-disabled); }
.modal-input:focus { border-color: var(--color-primary); background: #fff; }
.modal-actions { display: flex; gap: 12px; }
.modal-actions .btn { flex: 1; }

/* ── Audio Player ──────────────────────────────────────────────────── */
.audio-player {
  position: sticky; top: 0; z-index: 50;
  background: var(--color-bg-card); border-bottom: 1px solid var(--color-border);
  padding: 10px 16px; box-shadow: var(--shadow-sm);
}
.audio-player audio { width: 100%; height: 36px; }
.audio-player .player-hint {
  font-size: 11px; color: var(--color-text-tertiary); text-align: center; margin-top: 4px;
}

/* Transcript clickable */
.transcript-item { cursor: pointer; padding: 4px 0; border-radius: var(--radius-sm); transition: background 0.15s; }
.transcript-item:active { background: var(--color-primary-light); }
.transcript-item.playing { background: #EEF2FF; border-left: 3px solid var(--color-primary); padding-left: 8px; }

/* ── Profile / 我的 ────────────────────────────────────────────────── */
.profile-section { padding: 16px; }
.profile-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
}
.profile-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--color-primary), #818CF8);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; color: #fff;
}
.profile-name { font-size: 18px; font-weight: 600; }
.profile-sub { font-size: 13px; color: var(--color-text-tertiary); }
.profile-stats {
  display: flex; gap: 12px; margin-bottom: 24px;
}
.stat-card {
  flex: 1; background: var(--color-bg-card); border-radius: var(--radius-md);
  padding: 14px; text-align: center; box-shadow: var(--shadow-sm);
}
.stat-num { font-size: 22px; font-weight: 700; color: var(--color-primary); }
.stat-label { font-size: 12px; color: var(--color-text-tertiary); margin-top: 2px; }
.profile-menu-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: var(--color-bg-card); border-radius: var(--radius-md);
  margin-bottom: 8px; box-shadow: var(--shadow-sm); cursor: pointer;
}
.profile-menu-item svg { width: 20px; height: 20px; color: var(--color-text-secondary); flex-shrink: 0; }
.profile-menu-item span { flex: 1; font-size: 14px; }
.profile-menu-item .arrow { flex: none; color: var(--color-text-tertiary); font-size: 16px; }

/* ── Skeleton ──────────────────────────────────────────────────────── */
.skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
  <h1><span>Voice</span>KB</h1>
  <div id="navRight"></div>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Views — 内部容器滚动，不触发浏览器地址栏收缩 -->
<div class="view-container">
  <div id="viewHome" class="view active"></div>
  <div id="viewDetail" class="view"></div>
  <div id="viewChat" class="view"></div>
  <div id="viewProfile" class="view"></div>
</div>

<!-- FAB Upload Button — label 直接关联 input，避免 JS .click() 在移动端被拦截 -->
<label class="btn btn-primary btn-fab" id="fabUpload" for="fileInput">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</label>

<!-- File input -->
<input type="file" id="fileInput" accept="audio/*,.wav,.mp3,.m4a,.flac,.ogg,.wma,.aac,.opus" onchange="handleFileSelect(this.files[0])" style="display:none">

<!-- Bottom Tab Bar -->
<nav class="tab-bar">
  <button class="tab-item active" data-view="viewHome" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>
    <span>录音</span>
  </button>
  <button class="tab-item" data-view="viewChat" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    <span>问答</span>
  </button>
  <button class="tab-item" data-view="viewProfile" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>我的</span>
  </button>
</nav>

<script>
/* ── State ──────────────────────────────────────────────────────────── */
const API = '';  // same origin
let currentView = 'viewHome';
let recordings = [];
let currentRecording = null;

/* ── Tab Navigation ────────────────────────────────────────────────── */
function switchTab(el) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const viewId = el.dataset.view;
  if (viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    currentView = viewId;
    if (viewId === 'viewHome') loadRecordings();
    if (viewId === 'viewChat') initChatView();
    if (viewId === 'viewProfile') initProfileView();
  }
  document.getElementById('fabUpload').classList.toggle('hidden', viewId !== 'viewHome');
}

/* ── Toast ──────────────────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── API Helpers ────────────────────────────────────────────────────── */
async function api(path, opts = {}) {
  const resp = await fetch(API + path, opts);
  if (!resp.ok) throw new Error(`API ${resp.status}`);
  return resp.json();
}

/* ── Home View: 搜索 + 录音列表 ───────────────────────────────────── */
let activeCategory = '';  // 当前筛选的分类

async function loadRecordings() {
  const view = document.getElementById('viewHome');
  try {
    recordings = await api('/api/recordings');
    const catPresets = await api('/api/categories');
    // 从预置列表中取名称
    const categories = catPresets.map(c => c.name || c);

    const searchBar = `
      <div class="search-bar">
        <input class="search-input" id="homeSearchInput" placeholder="搜索录音内容..." oninput="debounceHomeSearch()">
      </div>`;

    // 分类筛选条（有录音使用了分类时才显示）
    const usedCats = [...new Set(recordings.map(r => r.category).filter(Boolean))];
    let filterBar = '';
    if (usedCats.length > 0) {
      const chips = usedCats.map(c =>
        `<button class="filter-chip ${activeCategory === c ? 'active' : ''}" onclick="filterByCategory('${c}')">${c}</button>`
      ).join('');
      filterBar = `
        <div class="filter-bar">
          <button class="filter-chip ${activeCategory === '' ? 'active' : ''}" onclick="filterByCategory('')">全部</button>
          ${chips}
        </div>`;
    }

    if (recordings.length === 0) {
      view.innerHTML = `
        ${searchBar}
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <h3>还没有录音</h3>
          <p>点击右下角 + 上传你的第一段录音</p>
          <label class="btn btn-primary" for="fileInput" style="cursor:pointer">上传录音</label>
        </div>`;
      return;
    }

    const filtered = activeCategory ? recordings.filter(r => r.category === activeCategory) : recordings;
    const cards = filtered.map(r => renderRecordingCard(r)).join('');
    view.innerHTML = `
      ${searchBar}
      ${filterBar}
      <div id="homeSearchResults" class="hidden"></div>
      <div id="homeRecordingList">${cards}</div>`;
  } catch(e) {
    view.innerHTML = '<div class="card"><p>加载失败，请稍后重试</p></div>';
  }
}

function filterByCategory(cat) {
  activeCategory = cat;
  loadRecordings();
}

let homeSearchTimer;
function debounceHomeSearch() {
  clearTimeout(homeSearchTimer);
  homeSearchTimer = setTimeout(doHomeSearch, 400);
}

async function doHomeSearch() {
  const q = document.getElementById('homeSearchInput')?.value?.trim();
  const resultsDiv = document.getElementById('homeSearchResults');
  const listDiv = document.getElementById('homeRecordingList');
  if (!resultsDiv || !listDiv) return;

  const filterBar = document.querySelector('.filter-bar');

  if (!q) {
    resultsDiv.classList.add('hidden');
    listDiv.classList.remove('hidden');
    if (filterBar) filterBar.classList.remove('hidden');
    return;
  }

  // 显示加载中
  listDiv.classList.add('hidden');
  resultsDiv.classList.remove('hidden');
  resultsDiv.innerHTML = '<div style="text-align:center;padding:20px;color:var(--color-text-tertiary)">搜索中...</div>';
  if (filterBar) filterBar.classList.add('hidden');

  try {
    const results = await api(`/api/search?q=${encodeURIComponent(q)}&type=hybrid`);

    if (results.length === 0) {
      resultsDiv.innerHTML = '<div class="card" style="text-align:center;color:var(--color-text-tertiary)">没有找到相关内容</div>';
      return;
    }
    resultsDiv.innerHTML = results.map(r => {
      const text = r.segment.text.replace(
        new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'),
        '<mark class="search-highlight">$1</mark>'
      );
      return `
        <div class="search-result-item" onclick="openRecording('${r.recording_id}', ${r.segment.start || 0})">
          <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:3px">${(recordings.find(rc=>rc.id===r.recording_id)?.title) || r.recording_filename} · ${r.segment.speaker_id}</div>
          <div style="font-size:14px;line-height:1.6">${text}</div>
        </div>`;
    }).join('');
  } catch(e) {
    resultsDiv.innerHTML = '<div class="card">搜索出错</div>';
    resultsDiv.classList.remove('hidden');
  }
}

function renderRecordingCard(r) {
  const date = relativeTime(r.created_at);
  const dur = r.duration ? friendlyDuration(r.duration) : '';
  const statusClass = r.status;
  const statusText = {pending:'等待中', processing:'处理中', completed:'已完成', failed:'失败'}[r.status] || r.status;
  const speakers = (r.speakers||[]).map((s,i) => `<span class="speaker-tag">${s}</span>`).join('');

  return `
    <div class="card rec-card" onclick="openRecording('${r.id}')" oncontextmenu="event.preventDefault();showRecordingMenu('${r.id}')" ontouchstart="this._lt=setTimeout(()=>{showRecordingMenu('${r.id}')},500)" ontouchend="clearTimeout(this._lt)" ontouchmove="clearTimeout(this._lt)">
      <div class="rec-header">
        <div class="rec-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          </svg>
        </div>
        <div class="rec-info">
          <div class="rec-name">${r.title || r.filename}</div>
          <div class="rec-meta">${date} · ${dur}${r.status !== 'completed' ? ` <span class="rec-status ${statusClass}">${statusText}</span>` : ''}</div>
        </div>
      </div>
      <div class="rec-speakers">
        ${r.category && r.category !== '其他' ? `<span class="category-tag">${r.category}</span>` : ''}
        ${speakers}
      </div>
    </div>`;
}

/* ── Upload ─────────────────────────────────────────────────────────── */
function showUploadModal() {
  document.getElementById('fileInput').click();
}

async function handleFileSelect(file) {
  if (!file) return;
  const view = document.getElementById('viewHome');

  // Show progress
  view.innerHTML = `
    <div class="card">
      <div class="card-title">上传中: ${file.name}</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="uploadBar" style="width:0%"></div></div>
      <div class="progress-text" id="uploadText">上传中...</div>
    </div>`;

  try {
    const fd = new FormData();
    fd.append('file', file);
    const resp = await fetch(API + '/api/upload', {method:'POST', body:fd});
    if (!resp.ok) throw new Error('Upload failed');
    const data = await resp.json();

    showToast('上传成功，开始处理');
    watchProgress(data.recording_id);
  } catch(e) {
    showToast('上传失败: ' + e.message);
    loadRecordings();
  }
}

function watchProgress(recId) {
  const view = document.getElementById('viewHome');
  view.innerHTML = `
    <div class="card">
      <div class="card-title">处理中...</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="procBar" style="width:0%"></div></div>
      <div class="progress-text" id="procText">准备中...</div>
    </div>`;

  // Poll progress
  const poll = setInterval(async () => {
    try {
      const status = await api(`/api/recordings/${recId}/status`);
      const bar = document.getElementById('procBar');
      const text = document.getElementById('procText');
      if (bar) bar.style.width = Math.max(0, status.percent) + '%';
      if (text) text.textContent = `${status.step} (${Math.max(0, status.percent)}%)`;

      if (status.percent >= 100 || status.percent < 0) {
        clearInterval(poll);
        if (status.percent >= 100) {
          showToast('处理完成！');
          setTimeout(() => openRecording(recId), 500);
        } else {
          showToast('处理失败');
          loadRecordings();
        }
      }
    } catch(e) { /* continue polling */ }
  }, 1500);

  // Also try WebSocket
  try {
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${wsProto}//${location.host}/ws/progress/${recId}`);
    ws.onmessage = (e) => {
      const status = JSON.parse(e.data);
      const bar = document.getElementById('procBar');
      const text = document.getElementById('procText');
      if (bar) bar.style.width = Math.max(0, status.percent) + '%';
      if (text) text.textContent = `${status.step} (${Math.max(0, status.percent)}%)`;
    };
  } catch(e) { /* WebSocket not critical, polling is backup */ }
}

/* ── Recording Detail ──────────────────────────────────────────────── */
async function openRecording(recId, seekTime) {
  const view = document.getElementById('viewDetail');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  view.classList.add('active');
  document.getElementById('fabUpload').classList.add('hidden');

  try {
    const rec = await api(`/api/recordings/${recId}`);
    currentRecording = rec;

    if (rec.status === 'processing') {
      // 处理中 — 显示进度，轮询等待完成
      view.innerHTML = `
        <div style="padding:16px">
          <div class="detail-back" onclick="backToList()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            返回
          </div>
          <div class="card" style="margin-top:12px">
            <div class="card-title">${rec.title || rec.filename}</div>
            <div style="margin:16px 0">
              <div class="progress-bar-bg"><div class="progress-bar-fill" id="detailProcBar" style="width:0%"></div></div>
              <div class="progress-text" id="detailProcText" style="margin-top:8px;text-align:center;font-size:13px;color:var(--color-text-secondary)">处理中...</div>
            </div>
            <div style="font-size:12px;color:var(--color-text-tertiary);text-align:center">正在重新识别，请稍候</div>
          </div>
        </div>`;
      // 轮询进度
      const poll = setInterval(async () => {
        try {
          const st = await api(`/api/recordings/${recId}/status`);
          const bar = document.getElementById('detailProcBar');
          const txt = document.getElementById('detailProcText');
          if (bar) bar.style.width = Math.max(0, st.percent) + '%';
          if (txt) txt.textContent = `${st.step} (${Math.max(0, st.percent)}%)`;
          if (st.percent >= 100 || st.percent < 0) {
            clearInterval(poll);
            showToast(st.percent >= 100 ? '处理完成' : '处理失败');
            openRecording(recId);
          }
        } catch(e) {}
      }, 2000);
    } else {
      renderDetail(rec);
      // 搜索结果跳转：滚动到对应时间段并高亮
      if (seekTime > 0) {
        setTimeout(() => {
          const items = document.querySelectorAll('.transcript-item');
          for (const item of items) {
            const start = parseFloat(item.dataset.start);
            if (start >= seekTime - 1) {
              item.classList.add('playing');
              item.scrollIntoView({behavior: 'smooth', block: 'center'});
              // 播放
              const audio = document.getElementById('audioPlayer');
              if (audio) { audio.currentTime = start; audio.play(); }
              break;
            }
          }
        }, 300);
      }
    }
  } catch(e) {
    view.innerHTML = '<div class="card"><p>加载失败</p></div>';
  }
}

function renderDetail(rec) {
  const view = document.getElementById('viewDetail');
  const dur = `${Math.floor(rec.duration/60)}分${Math.floor(rec.duration%60)}秒`;
  const date = new Date(rec.created_at).toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});

  const speakerColors = {};
  let colorIdx = 0;
  (rec.speakers||[]).forEach(s => { speakerColors[s] = colorIdx++; });

  const segments = (rec.segments||[]).map((seg, idx) => {
    const ci = speakerColors[seg.speaker_id] ?? 0;
    const ts = `${String(Math.floor(seg.start/60)).padStart(2,'0')}:${String(Math.floor(seg.start%60)).padStart(2,'0')}`;
    const initial = seg.speaker_id.charAt(0) || 'S';
    return `
      <div class="transcript-item" data-start="${seg.start}" data-end="${seg.end}" data-idx="${idx}" onclick="seekAudio(${seg.start}, ${idx})">
        <div class="transcript-avatar spk-${ci % 5}">${initial}</div>
        <div class="transcript-bubble">
          <div class="transcript-speaker">
            <span class="speaker-tag" onclick="event.stopPropagation();showRenameModal('${seg.speaker_id}')" style="padding:1px 6px;font-size:11px">${seg.speaker_id}</span>
            <span class="ts">${ts}</span>
          </div>
          <div class="transcript-text">${seg.text}</div>
        </div>
      </div>`;
  }).join('');

  view.innerHTML = `
    <div class="detail-header">
      <div class="detail-back" onclick="backToList()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div style="flex:1">
          <div class="detail-title">${rec.title || rec.filename}</div>
          <div class="detail-meta">${date} · ${dur} · ${(rec.speakers||[]).join(', ')}</div>
        </div>
        <button onclick="showRecordingMenu('${rec.id}')" style="border:none;background:none;padding:4px 8px;cursor:pointer;color:var(--color-text-tertiary);font-size:20px">···</button>
      </div>
    </div>
    <div class="audio-player">
      <audio id="audioPlayer" controls preload="metadata" src="/api/recordings/${rec.id}/audio"></audio>
      <div class="player-hint">点击对话文字可跳转播放对应片段</div>
    </div>
    ${rec.summary ? `
      <div class="summary-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <h4 style="margin:0">会议摘要</h4>
          <span style="font-size:11px;color:var(--color-primary);cursor:pointer" onclick="openPromptEditor('${rec.category||'_default'}','${rec.id}')">调整总结方式</span>
        </div>
        <div class="summary-text">${rec.summary.replace(/\n/g, '<br>')}</div>
      </div>` : ''}
    <div style="padding:0 16px;margin-bottom:12px">
      <div style="font-size:15px;font-weight:600">对话记录</div>
    </div>
    <div class="transcript">${segments}</div>`;

  // 音频播放时自动高亮当前片段
  const audio = document.getElementById('audioPlayer');
  if (audio) {
    audio.addEventListener('timeupdate', () => {
      const t = audio.currentTime;
      document.querySelectorAll('.transcript-item').forEach(el => {
        const start = parseFloat(el.dataset.start);
        const end = parseFloat(el.dataset.end);
        if (t >= start && t < end) {
          if (!el.classList.contains('playing')) {
            document.querySelectorAll('.transcript-item.playing').forEach(e => e.classList.remove('playing'));
            el.classList.add('playing');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      });
    });
  }
}

function seekAudio(startTime, idx) {
  const audio = document.getElementById('audioPlayer');
  if (audio) {
    audio.currentTime = startTime;
    audio.play();
    // 高亮当前片段
    document.querySelectorAll('.transcript-item.playing').forEach(e => e.classList.remove('playing'));
    const item = document.querySelector(`.transcript-item[data-idx="${idx}"]`);
    if (item) item.classList.add('playing');
  }
}

function showRecordingMenu(recId) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'renameModal';
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };
  modal.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-title">\u64cd\u4f5c</div>
      <div class="profile-menu-item" onclick="closeModal();showCategoryEditor('${recId}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <span>\u4fee\u6539\u5206\u7c7b</span>
      </div>
      <div class="profile-menu-item" onclick="closeModal();resummarizeRecording('${recId}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span>\u91cd\u65b0\u603b\u7ed3</span>
      </div>
      <div class="profile-menu-item" onclick="closeModal();reprocessRecording('${recId}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        <span>\u91cd\u65b0\u8bc6\u522b</span>
        <span style="font-size:10px;color:var(--color-text-tertiary);flex:none">(\u8f83\u6162)</span>
      </div>
      <div class="profile-menu-item" onclick="closeModal();deleteRecording('${recId}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="#FF3B30" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        <span style="color:#FF3B30">\u5220\u9664\u5f55\u97f3</span>
      </div>
      <div style="margin-top:12px">
        <button class="btn btn-outline btn-block" onclick="closeModal()">\u53d6\u6d88</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function showCategoryEditor(recId) {
  const presets = await api('/api/categories');
  const rec = recordings.find(r => r.id === recId);
  const current = rec?.category || '';

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'renameModal';
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };

  const chips = presets.map(p =>
    `<button class="filter-chip ${p.name === current ? 'active' : ''}" onclick="selectCategory('${recId}','${p.name}')" style="margin-bottom:8px">${p.name}</button>`
  ).join(' ');

  modal.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-title">\u4fee\u6539\u5206\u7c7b</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${chips}</div>
      <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:8px">\u6ca1\u6709\u5408\u9002\u7684\uff1f\u6dfb\u52a0\u65b0\u5206\u7c7b</div>
      <div style="display:flex;gap:8px">
        <input class="modal-input" id="newCatInput" placeholder="\u8f93\u5165\u65b0\u5206\u7c7b\u540d\u79f0..." style="margin-bottom:0;flex:1">
        <button class="btn btn-primary btn-sm" onclick="addAndSelectCategory('${recId}')">\u6dfb\u52a0</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function addAndSelectCategory(recId) {
  const name = document.getElementById('newCatInput')?.value?.trim();
  if (!name) return;
  await api('/api/categories', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({category: name}),
  });
  await selectCategory(recId, name);
}

async function selectCategory(recId, category) {
  if (!category) return;
  await api(`/api/recordings/${recId}/category`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({category}),
  });
  closeModal();
  showToast(`\u5df2\u5206\u7c7b\u4e3a\u300c${category}\u300d`);
  if (currentRecording?.id === recId) openRecording(recId);
}

async function resummarizeRecording(recId) {
  showToast('正在重新总结...');
  try {
    await api(`/api/recordings/${recId}/resummarize`, {method:'POST'});
    showToast('总结已更新');
    openRecording(recId);
  } catch(e) {
    showToast('总结失败');
  }
}

async function reprocessRecording(recId) {
  showToast('重新识别中...');
  try {
    await api(`/api/recordings/${recId}/reprocess`, {method:'POST'});
    // 回到首页显示进度
    backToList();
    watchProgress(recId);
  } catch(e) {
    showToast('操作失败: ' + e.message);
  }
}

async function deleteRecording(recId) {
  if (!confirm('确定要删除这条录音吗？删除后不可恢复。')) return;
  try {
    await api(`/api/recordings/${recId}/delete`, {method:'POST'});
    showToast('已删除');
    backToList();
  } catch(e) {
    showToast('删除失败');
  }
}

function backToList() {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('viewHome').classList.add('active');
  document.getElementById('fabUpload').classList.remove('hidden');
  document.querySelectorAll('.tab-item')[0].classList.add('active');
  loadRecordings();

let chatConversationId = 'default';
let chatInitialized = false;

async function initChatView() {
  const view = document.getElementById('viewChat');

  // 已初始化过，只需滚到底部，不重建 DOM
  if (chatInitialized) {
    const msgs = document.getElementById('chatMessages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
    return;
  }

  view.innerHTML = `
    <div class="chat-messages" id="chatMessages"></div>
    <div style="display:flex;gap:6px;padding:4px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0" id="chatQuickBar">
      <button class="filter-chip" onclick="quickAsk(this.textContent)" style="flex-shrink:0;font-size:11px">最近讨论了什么？</button>
      <button class="filter-chip" onclick="quickAsk(this.textContent)" style="flex-shrink:0;font-size:11px">有哪些待办事项？</button>
      <button class="filter-chip" onclick="quickAsk(this.textContent)" style="flex-shrink:0;font-size:11px">关键决策总结</button>
    </div>
    <div class="chat-input-bar">
      <input class="chat-input" id="chatInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>`;

  // 加载历史对话
  const msgs = document.getElementById('chatMessages');
  try {
    const history = await api(`/api/chat/history?conversation_id=${chatConversationId}&limit=50`);
    if (history.length === 0) {
      msgs.innerHTML = `<div class="chat-msg ai"><div class="bubble">你好！我是 VoiceKB 智能助手，可以帮你查找和分析录音内容。试试下方的快捷提问，或直接输入你的问题。</div></div>`;
    } else {
      history.forEach(m => {
        const cls = m.role === 'user' ? 'user' : 'ai';
        let html = m.content.replace(/\n/g, '<br>');
        msgs.innerHTML += `<div class="chat-msg ${cls}"><div class="bubble">${html}</div></div>`;
      });
    }
  } catch(e) {
    msgs.innerHTML = `<div class="chat-msg ai"><div class="bubble">\u4f60\u597d\uff01\u6709\u4ec0\u4e48\u53ef\u4ee5\u5e2e\u4f60\u7684\uff1f</div></div>`;
  }
  // 延迟滚动，等 DOM 渲染完毕
  requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight; });
  chatInitialized = true;
}

function quickAsk(question) {
  const input = document.getElementById('chatInput');
  if (input) { input.value = question; sendChat(); }
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';

  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML += `<div class="chat-msg user"><div class="bubble">${q}</div></div>`;
  msgs.innerHTML += `<div class="chat-msg ai" id="chatLoading"><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>`;
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const result = await api('/api/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question: q, conversation_id: chatConversationId}),
    });

    document.getElementById('chatLoading')?.remove();

    let html = result.answer.replace(/\n/g, '<br>');
    if (result.sources?.length) {
      html += '<br><span class="source-link">来源: ';
      const seen = new Set();
      result.sources.forEach(s => {
        if (!seen.has(s.recording_id)) {
          seen.add(s.recording_id);
          html += `<a href="#" onclick="openRecording('${s.recording_id}');return false">${s.recording_filename}</a> `;
        }
      });
      html += '</span>';
    }

    msgs.innerHTML += `<div class="chat-msg ai"><div class="bubble">${html}</div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
  } catch(e) {
    document.getElementById('chatLoading')?.remove();
    msgs.innerHTML += `<div class="chat-msg ai"><div class="bubble">抱歉，出了点问题，请稍后再试。</div></div>`;
  }
}

// 入口1: 摘要卡片上的"调整总结方式"
// 入口2: 我的 → 摘要模板（管理总览）
const PROMPT_VARS = [
  {label: '录音标题', key: '{标题}', desc: '自动生成的标题'},
  {label: '参与者', key: '{参与者}', desc: '所有说话人名称'},
  {label: '时长', key: '{时长}', desc: '录音分钟数'},
  {label: '分类', key: '{分类}', desc: '录音类别'},
];

// 从摘要卡片或"我的"页面进入编辑器
async function openPromptEditor(category, recordingId) {
  // 规范化参数
  category = category || '_default';
  recordingId = recordingId || '';  // 确保是字符串，不是 undefined
  const catLabel = c => c === '_default' ? '通用' : c;

  // 获取三层 prompt
  const allPrompts = await api('/api/summary-prompts');
  const catPrompt = allPrompts.find(p => p.category === category);
  let recPrompt = '';
  if (recordingId) {
    try {
      const rec = await api(`/api/recordings/${recordingId}`);
      recPrompt = rec.custom_prompt || '';
    } catch(e) {}
  }
  let builtinText = '';
  try {
    const resp = await api(`/api/summary-prompts/builtin/${encodeURIComponent(category)}`);
    builtinText = resp.prompt || '';
  } catch(e) {}

  // 当前生效的 prompt（一定不为空，至少有 builtin）
  const activePrompt = recPrompt || catPrompt?.prompt || builtinText || '请总结这段录音的关键内容。';
  const activeSource = recPrompt ? 'recording' : catPrompt ? 'category' : 'builtin';
  const hasRecScope = !!recordingId;
  const fromProfile = !recordingId;

  // 全屏编辑视图
  const viewId = recordingId ? 'viewDetail' : 'viewProfile';
  const view = document.getElementById(viewId);
  const prevHtml = view.innerHTML;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  view.classList.add('active');
  document.getElementById('fabUpload').classList.add('hidden');

  // 作用范围选项
  const scopeHtml = hasRecScope ? `
    <div style="font-size:13px;font-weight:600;margin-bottom:6px">修改后生效范围</div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="filter-chip active" id="scopeThis" onclick="setScope('this')">仅本条录音</button>
      <button class="filter-chip" id="scopeAll" onclick="setScope('all')">所有「${catLabel(category)}」类</button>
    </div>` : '';

  view.innerHTML = `
    <div style="padding:16px">
      <div class="detail-back" onclick="restoreDetail()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </div>
      <div style="font-size:18px;font-weight:700;margin:12px 0 6px">调整总结方式</div>
      <div style="font-size:13px;color:var(--color-text-tertiary);margin-bottom:16px">${catLabel(category)}${activeSource !== 'builtin' ? ' · <span style="color:var(--color-primary)">已自定义</span>' : ''}</div>

      <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px">告诉 AI 你希望怎么总结这类录音：</div>
      <textarea id="promptTextarea" rows="6" style="width:100%;border:1.5px solid var(--color-border);border-radius:var(--radius-lg);padding:12px;font-size:14px;font-family:inherit;resize:vertical;outline:none;color:var(--color-text-primary);line-height:1.7;background:var(--color-bg-card)" placeholder="例如：&#10;• 重点列出行动项和负责人&#10;• 用表格形式整理决策&#10;• 提取关键数据和数字">${activePrompt}</textarea>

      ${hasRecScope ? `
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn btn-primary" style="flex:1" onclick="savePromptWithScope('${category.replace(/'/g,"\\'")}', '${recordingId}', 'this')">保存并重新总结</button>
        </div>
        <button class="btn btn-outline btn-block" style="margin-top:8px" onclick="savePromptWithScope('${category.replace(/'/g,"\\'")}', '${recordingId}', 'all')">应用到所有「${catLabel(category)}」类</button>
      ` : `
        <button class="btn btn-primary btn-block" style="margin-top:14px" onclick="savePromptWithScope('${category.replace(/'/g,"\\'")}', '', 'all')">保存</button>
      `}

      ${activeSource !== 'builtin' ? `
        <div style="text-align:center;margin-top:12px">
          <span style="font-size:12px;color:var(--color-text-tertiary);cursor:pointer;text-decoration:underline" onclick="resetToDefault(${catPrompt?.id || 'null'})">恢复默认</span>
        </div>` : ''}
    </div>`;

  // 清除另一个 view 的残留状态，防止返回跳错
  if (fromProfile) {
    document.getElementById('viewDetail')._prevRecId = '';
  } else {
    document.getElementById('viewProfile')._prevHtml = null;
  }

  // 记住上下文
  view._prevHtml = prevHtml;
  view._prevRecId = recordingId;
  view._promptCategory = category;

  // 填充编辑器
  const editor = document.getElementById('promptEditor');
  if (editor) editor.innerHTML = promptToHtml(activePrompt);
}

let promptScope = 'this'; // 'this' = 仅本条, 'all' = 所有同类
function setScope(scope) {
  promptScope = scope;
  document.getElementById('scopeThis')?.classList.toggle('active', scope === 'this');
  document.getElementById('scopeAll')?.classList.toggle('active', scope === 'all');
}

async function savePromptWithScope(category, recordingId, scope) {
  const textarea = document.getElementById('promptTextarea');
  if (!textarea) return;
  const prompt = textarea.value.trim();
  if (!prompt) { showToast('请输入总结要求'); return; }

  if (scope === 'this' && recordingId) {
    await api(`/api/recordings/${recordingId}/prompt`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt}),
    });
  } else {
    await api('/api/summary-prompts', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({category, prompt}),
    });
  }

  // 仅重新总结（不重跑 ASR，几秒完成）
  if (recordingId) {
    showToast('正在重新总结...');
    await api(`/api/recordings/${recordingId}/resummarize`, {method: 'POST'});
    showToast('总结已更新');
  } else {
    showToast('已保存');
  }
  restoreDetail();
}

function restoreDetail() {
  // 从录音详情进入的 → 回到录音详情
  const detailView = document.getElementById('viewDetail');
  if (detailView._prevRecId) {
    openRecording(detailView._prevRecId);
    return;
  }
  // 从"我的"进入的 → 回到"我的"
  const profileView = document.getElementById('viewProfile');
  if (profileView._prevHtml) {
    profileView.innerHTML = profileView._prevHtml;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    profileView.classList.add('active');
    profileView._prevHtml = null;
    return;
  }
  backToList();
}

// 修复：首个占位符退格删不掉
document.addEventListener('keydown', (e) => {
  const editor = document.getElementById('promptEditor');
  if (!editor || document.activeElement !== editor) return;
  if (e.key !== 'Backspace' && e.key !== 'Delete') return;

  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);

  // 光标在编辑器开头，且第一个子节点是 chip
  if (e.key === 'Backspace' && range.collapsed) {
    const node = range.startContainer;
    // 光标在第一个文本节点且 offset=0，前面是 chip
    if (node === editor && range.startOffset > 0) {
      const prev = editor.childNodes[range.startOffset - 1];
      if (prev?.classList?.contains('var-chip')) {
        e.preventDefault();
        prev.remove();
        return;
      }
    }
    if (node.nodeType === 3 && range.startOffset === 0) {
      const prev = node.previousSibling;
      if (prev?.classList?.contains('var-chip')) {
        e.preventDefault();
        prev.remove();
        return;
      }
    }
  }

  // Delete 键删除后面的 chip
  if (e.key === 'Delete' && range.collapsed) {
    const node = range.startContainer;
    if (node.nodeType === 3 && range.startOffset === node.textContent.length) {
      const next = node.nextSibling;
      if (next?.classList?.contains('var-chip')) {
        e.preventDefault();
        next.remove();
      }
    }
  }
});

// @ 触发变量选择
function onPromptInput(e) {
  const editor = document.getElementById('promptEditor');
  const dropdown = document.getElementById('varDropdown');
  if (!editor || !dropdown) return;

  const sel = window.getSelection();
  if (!sel.rangeCount) return;

  const range = sel.getRangeAt(0);
  const textNode = range.startContainer;
  if (textNode.nodeType !== 3) { dropdown.classList.add('hidden'); return; }

  const text = textNode.textContent;
  const cursor = range.startOffset;
  const atIdx = text.lastIndexOf('@', cursor - 1);

  if (atIdx >= 0 && cursor - atIdx <= 6) {
    const query = text.substring(atIdx + 1, cursor).toLowerCase();
    const matches = PROMPT_VARS.filter(v => !query || v.label.toLowerCase().includes(query));
    if (matches.length) {
      dropdown.innerHTML = matches.map(v =>
        `<div class="var-dropdown-item" onmousedown="event.preventDefault();insertVar('${v.key}', '${v.label}', ${atIdx}, ${cursor})">
          <span class="var-label">${v.label}</span>
          <span class="var-desc">${v.desc}</span>
        </div>`
      ).join('');
      dropdown.classList.remove('hidden');
      return;
    }
  }
  dropdown.classList.add('hidden');
}

function insertVar(key, label, atIdx, cursor) {
  const editor = document.getElementById('promptEditor');
  const dropdown = document.getElementById('varDropdown');
  dropdown?.classList.add('hidden');

  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const textNode = range.startContainer;
  if (textNode.nodeType !== 3) return;

  // 删除 @query 文本
  const text = textNode.textContent;
  const before = text.substring(0, atIdx);
  const after = text.substring(cursor);

  // 创建标签
  const chip = document.createElement('span');
  chip.className = 'var-chip';
  chip.contentEditable = 'false';
  chip.dataset.var = key;
  chip.textContent = label;

  const beforeNode = document.createTextNode(before);
  const afterNode = document.createTextNode(after || '\u00A0');

  const parent = textNode.parentNode;
  parent.insertBefore(beforeNode, textNode);
  parent.insertBefore(chip, textNode);
  parent.insertBefore(afterNode, textNode);
  parent.removeChild(textNode);

  // 光标移到标签后
  const newRange = document.createRange();
  newRange.setStart(afterNode, afterNode.length > 0 ? 1 : 0);
  newRange.collapse(true);
  sel.removeAllRanges();
  sel.addRange(newRange);
  editor.focus();
}

// 编辑器内容 → 存储格式（标签→占位符）
function editorToPrompt(editor) {
  let result = '';
  editor.childNodes.forEach(node => {
    if (node.nodeType === 3) {
      result += node.textContent;
    } else if (node.classList?.contains('var-chip')) {
      result += node.dataset.var;
    } else if (node.tagName === 'BR') {
      result += '\n';
    } else {
      result += node.textContent;
    }
  });
  return result.trim();
}

// 存储格式 → 显示 HTML（占位符→标签）
function promptToHtml(prompt) {
  let html = prompt;
  PROMPT_VARS.forEach(v => {
    html = html.replaceAll(v.key, `<span class="var-chip" contenteditable="false" data-var="${v.key}">${v.label}</span>`);
  });
  return html.replace(/\n/g, '<br>');
}

// 存储格式 → 纯显示文本（占位符→标签名）
function promptToDisplay(prompt) {
  let text = prompt;
  PROMPT_VARS.forEach(v => { text = text.replaceAll(v.key, `[${v.label}]`); });
  return text;
}

let vocabActiveTab = 'person';

async function showVocabManager() {
  const vocab = await api('/api/vocabulary');
  const tabs = {person: '人名', term: '术语'};
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'renameModal';
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };

  const tabHtml = Object.entries(tabs).map(([k, v]) =>
    `<button class="filter-chip ${vocabActiveTab === k ? 'active' : ''}" onclick="vocabActiveTab='${k}';closeModal();showVocabManager()">${v}</button>`
  ).join('');

  const filtered = vocab.filter(v => v.category === vocabActiveTab);
  const placeholder = vocabActiveTab === 'person' ? '输入人名（如：周神、张三）' : '输入术语（如：K8s、微服务）';
  const list = filtered.map(v => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--color-border)">
      <span style="font-weight:500;font-size:14px">${v.term}</span>
      <span style="color:var(--color-text-disabled);cursor:pointer;font-size:18px;padding:0 4px" onclick="deleteVocab(${v.id})">&times;</span>
    </div>`).join('');

  modal.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-title">术语管理</div>
      <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:12px">添加后新录音会自动使用，旧录音可点"重新识别"</div>
      <div style="display:flex;gap:8px;margin-bottom:14px">${tabHtml}</div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <input class="modal-input" id="vocabInput" placeholder="${placeholder}" style="margin-bottom:0;flex:1"
          onkeypress="if(event.key==='Enter')addVocab()">
        <button class="btn btn-primary" style="height:44px;flex-shrink:0" onclick="addVocab()">添加</button>
      </div>
      <div style="max-height:35vh;overflow-y:auto">
        ${list || '<p style="color:var(--color-text-tertiary);text-align:center;padding:20px 0">还没有添加' + tabs[vocabActiveTab] + '</p>'}
      </div>
      <div class="modal-actions" style="margin-top:14px">
        <button class="btn btn-outline btn-block" onclick="closeModal()">关闭</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  setTimeout(() => document.getElementById('vocabInput')?.focus(), 100);
}

async function addVocab() {
  const term = document.getElementById('vocabInput')?.value?.trim();
  if (!term) return;
  await api('/api/vocabulary', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({term, category: vocabActiveTab}),
  });
  closeModal();
  showVocabManager();
  showToast(`已添加"${term}"`);
}

async function deleteVocab(id) {
  await api(`/api/vocabulary/${id}/delete`, {method: 'POST'});
  closeModal();
  showVocabManager();
}

/* ── 后台恢复 — 手机切回前台时自动刷新状态 ──────────────────────────── */
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    console.log('Page resumed from background');
    // 恢复当前视图的数据
    if (currentView === 'viewHome') {
      loadRecordings();
    } else if (currentView === 'viewDetail' && currentRecording) {
      // 重新加载详情（可能处理已完成）
      openRecording(currentRecording.id);
    }
    // 如果有正在处理的录音，检查是否已完成
    checkProcessingRecordings();
  }
});

async function checkProcessingRecordings() {
  try {
    const recs = await api('/api/recordings');
    const processing = recs.filter(r => r.status === 'processing');
    if (processing.length > 0) {
      // 有录音还在处理，继续轮询
      processing.forEach(r => {
        watchProgress(r.id);
      });
    }
    // 如果之前在等处理，现在完成了，刷新列表
    const view = document.getElementById('viewHome');
    if (view.classList.contains('active') && view.querySelector('.progress-bar-bg')) {
      const allDone = recs.every(r => r.status !== 'processing');
      if (allDone) {
        loadRecordings();
        showToast('处理已完成');
      }
    }
  } catch(e) { /* ignore */ }
}

/* ── 键盘弹出适配 — 解决输入法首次遮挡输入框 ──────────────────────── */
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    // 键盘弹出时 visualViewport.height 变小
    const vvh = window.visualViewport.height;
    const offset = window.innerHeight - vvh;
    // 调整 view-container 高度，让 sticky 的输入框露出来
    const container = document.querySelector('.view-container');
    if (container) {
      container.style.height = offset > 50 ? `${vvh - 46}px` : '';  // 46 = top-nav height
    }
    // 滚动 chat 到底部
    if (offset > 50) {
      const msgs = document.getElementById('chatMessages');
      if (msgs) setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 50);
    }
  });
}

/* ── 工具函数 ──────────────────────────────────────────────────────── */
function relativeTime(dateStr) {
  const now = Date.now();
  const d = new Date(dateStr).getTime();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return '刚刚';
  if (diff < 3600) return `${Math.floor(diff/60)}分钟前`;
  if (diff < 86400) return `${Math.floor(diff/3600)}小时前`;
  if (diff < 172800) return '昨天';
  if (diff < 604800) return `${Math.floor(diff/86400)}天前`;
  return new Date(dateStr).toLocaleDateString('zh-CN', {month:'short', day:'numeric'});
}

function friendlyDuration(seconds) {
  if (!seconds) return '';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  if (m === 0) return `${s}秒`;
  return s > 0 ? `${m}分${s}秒` : `${m}分钟`;
}
