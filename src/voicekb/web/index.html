<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VoiceKB</title>
<style>
/* ===== Design Tokens — 从 hotel_shop 设计系统继承 ===== */
:root {
  /* 品牌色（VoiceKB 靛蓝主题） */
  --color-primary: #4F46E5;
  --color-primary-dark: #3730A3;
  --color-primary-light: #EEF2FF;
  /* 功能色（与 hotel_shop 统一） */
  --color-success: #00B578;
  --color-warning: #FF8F1F;
  --color-info: #1677FF;
  --color-danger: #FF3B30;
  /* 中性色（与 hotel_shop 完全一致） */
  --color-text-primary: #1D2129;
  --color-text-secondary: #4E5969;
  --color-text-tertiary: #86909C;
  --color-text-disabled: #C9CDD4;
  --color-border: #E5E6EB;
  --color-bg-page: #F7F8FA;
  --color-bg-card: #FFFFFF;
  --color-bg-hover: #F2F3F5;
  /* 阴影（与 hotel_shop 一致） */
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
  /* 圆角（与 hotel_shop 一致） */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 12px;
  --radius-full: 999px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden; /* 禁止 body 滚动，防止 Chrome 地址栏跳动 */
}
body {
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  background: var(--color-bg-page); color: var(--color-text-primary);
  font-size: 14px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  display: flex; flex-direction: column;
}
a { color: var(--color-primary); text-decoration: none; }

/* ===== Utilities ===== */
.hidden { display: none !important; }

/* ===== Top Nav ===== */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--color-bg-card); border-bottom: 1px solid var(--color-border);
  padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
}
.top-nav h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.top-nav h1 span { color: var(--color-primary); }

/* ===== Bottom Tab Bar ===== */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--color-bg-card); border-top: 1px solid var(--color-border);
  display: flex; padding: 4px 0 calc(4px + var(--safe-bottom));
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 4px 0; cursor: pointer; border: none; background: none;
  font-size: 10px; font-weight: 500; color: var(--color-text-tertiary); transition: color 0.15s;
}
.tab-item.active { color: var(--color-primary); font-weight: 600; }
.tab-item svg { width: 22px; height: 22px; margin-bottom: 2px; }

/* ===== View — 内部滚动容器，防止 Chrome 地址栏跳动 ===== */
.view-container {
  flex: 1; overflow: hidden; position: relative;
}
.view {
  display: none; padding: 8px 0;
  position: absolute; inset: 0;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain; /* 防止滚动穿透和下拉刷新 */
  padding-bottom: calc(56px + var(--safe-bottom));
}
.view.active { display: block; }

/* ===== Card — 继承 hotel_shop product-card 规范 ===== */
.card {
  background: var(--color-bg-card); border-radius: var(--radius-xl);
  padding: 14px 16px; margin: 0 12px 10px;
  box-shadow: var(--shadow-md); transition: box-shadow 0.2s;
}
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--color-text-primary); }
.card-meta { font-size: 12px; color: var(--color-text-tertiary); }

/* ===== Recording Card — 继承 product-card 结构 ===== */
.rec-card { cursor: pointer; transition: box-shadow 0.2s; }
.rec-card:active { box-shadow: var(--shadow-lg); }
.rec-header { display: flex; align-items: center; gap: 12px; }
.rec-icon {
  width: 44px; height: 44px; border-radius: var(--radius-lg);
  background: var(--color-primary-light); display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; border: 1px solid var(--color-border);
}
.rec-icon svg { width: 20px; height: 20px; color: var(--color-primary); }
.rec-info { flex: 1; min-width: 0; }
.rec-name { font-size: 15px; font-weight: 600; color: var(--color-text-primary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.rec-meta { font-size: 12px; color: var(--color-text-tertiary); margin-top: 2px; }
.rec-speakers { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
/* speaker-tag — 继承 product-tag + order-badge 规范 */
.speaker-tag {
  display: inline-flex; align-items: center; gap: 4px;
  height: 22px; padding: 0 8px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
  background: var(--color-primary-light); color: var(--color-primary-dark);
  cursor: pointer; border: none;
}
.speaker-tag:nth-child(2) { background: #FFF3E0; color: #E65100; }
.speaker-tag:nth-child(3) { background: #E8F5E9; color: #00B578; }
.speaker-tag:nth-child(4) { background: #FCE7F3; color: #DB2777; }
/* rec-status — 继承 order-badge 规范 */
.rec-status {
  display: inline-flex; align-items: center; gap: 3px;
  height: 22px; padding: 0 8px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 500;
}
.rec-status.completed { background: #E8F5E9; color: #00B578; }
.rec-status.processing { background: #FFF3E0; color: #FF8F1F; }
.rec-status.failed { background: #FFEBEE; color: #FF3B30; }

/* ── Empty State ───────────────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 60px 32px;
}
.empty-state svg { width: 120px; height: 120px; color: var(--color-text-tertiary); opacity: 0.3; margin-bottom: 20px; }
.empty-state h3 { font-size: 18px; color: var(--color-text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: var(--color-text-tertiary); margin-bottom: 24px; }

/* ===== Buttons — 继承 hotel_shop btn 规范 ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 40px; padding: 0 20px; border-radius: var(--radius-lg); font-size: 14px;
  font-weight: 500; border: none; cursor: pointer;
  transition: opacity 0.15s, box-shadow 0.15s; white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(180deg, #6366F1 0%, #4F46E5 100%);
  color: #fff; box-shadow: 0 2px 8px rgba(79,70,229,0.3);
}
.btn-primary:active { opacity: 0.88; }
.btn-outline { background: #fff; color: var(--color-primary-dark); border: 1.5px solid var(--color-primary); }
.btn-outline:active { background: var(--color-primary-light); }
.btn-sm { height: 32px; padding: 0 14px; font-size: 13px; border-radius: var(--radius-md); }
.btn-block { width: 100%; }
.btn-fab {
  position: fixed; right: 16px; bottom: calc(68px + var(--safe-bottom));
  width: 52px; height: 52px; border-radius: 50%; z-index: 90;
  box-shadow: 0 4px 16px rgba(79,70,229,0.35); padding: 0;
}
.btn-fab svg { width: 22px; height: 22px; }

/* ── Upload ────────────────────────────────────────────────────────── */
.upload-zone {
  border: 2px dashed var(--color-border); border-radius: var(--radius-md);
  padding: 40px 20px; text-align: center; margin: 16px;
  transition: border-color 0.2s, background 0.2s;
}
.upload-zone.dragover { border-color: var(--color-primary); background: var(--color-primary-light); }
.upload-zone svg { width: 48px; height: 48px; color: var(--color-primary); margin-bottom: 12px; }
.upload-zone p { font-size: 14px; color: var(--color-text-secondary); }
/* fileInput hidden via inline style */

/* ── Progress ──────────────────────────────────────────────────────── */
.progress-container { margin: 16px; }
.progress-bar-bg {
  width: 100%; height: 8px; background: #E5E7EB; border-radius: 4px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--color-primary), #818CF8);
  border-radius: 4px; transition: width 0.3s ease;
}
.progress-text { font-size: 13px; color: var(--color-text-secondary); margin-top: 8px; text-align: center; }

/* ── Detail View ───────────────────────────────────────────────────── */
.detail-header { padding: 16px; }
.detail-back { display: flex; align-items: center; gap: 4px; font-size: 14px; color: var(--color-primary); cursor: pointer; margin-bottom: 12px; }
.detail-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; word-break: break-all; }
.detail-meta { font-size: 13px; color: var(--color-text-tertiary); }

.summary-card {
  background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
  border-radius: var(--radius-md); padding: 16px; margin: 0 16px 12px;
}
.summary-card h4 { font-size: 14px; font-weight: 600; color: var(--color-primary-dark); margin-bottom: 8px; }
.summary-card .summary-text { font-size: 13px; color: var(--color-text-secondary); line-height: 1.7; white-space: pre-wrap; }

.transcript {
  padding: 0 16px;
}
.transcript-item {
  display: flex; gap: 10px; margin-bottom: 16px;
}
.transcript-avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff;
}
.transcript-bubble { flex: 1; }
.transcript-speaker {
  font-size: 12px; font-weight: 600; margin-bottom: 2px;
  display: flex; align-items: center; gap: 6px;
}
.transcript-speaker .ts { font-weight: 400; color: var(--color-text-tertiary); font-size: 11px; }
.transcript-text { font-size: 14px; color: var(--color-text-primary); line-height: 1.7; font-weight: 400; }

/* Speaker colors */
.spk-0 { background: var(--color-primary); }
.spk-1 { background: #D97706; }
.spk-2 { background: #059669; }
.spk-3 { background: #DB2777; }
.spk-4 { background: #7C3AED; }

/* ===== Search — 继承 hotel_shop input 规范 ===== */
.search-bar {
  display: flex; gap: 8px; padding: 0 12px; margin-bottom: 8px;
}
.search-input {
  flex: 1; height: 44px; padding: 0 14px;
  background: var(--color-bg-hover); border: 1.5px solid transparent;
  border-radius: var(--radius-lg); font-size: 14px; color: var(--color-text-primary);
  outline: none; transition: border-color 0.15s, background 0.15s; font-family: inherit;
}
.search-input::placeholder { color: var(--color-text-disabled); }
.search-input:focus { border-color: var(--color-primary); background: #fff; }
.search-result-item {
  padding: 12px 16px; border-bottom: 1px solid var(--color-border); cursor: pointer;
  transition: background 0.15s;
}
.search-result-item:active { background: var(--color-bg-hover); }
.search-highlight { background: #FFF3E0; padding: 1px 3px; border-radius: 2px; font-weight: 500; }

/* ===== Chat ===== */
.chat-messages { padding: 12px; min-height: calc(100vh - 220px); }
.chat-msg { margin-bottom: 14px; }
.chat-msg.user { text-align: right; }
.chat-msg .bubble {
  display: inline-block; max-width: 82%; padding: 10px 14px;
  border-radius: var(--radius-xl); font-size: 14px; line-height: 1.6; text-align: left;
}
.chat-msg.user .bubble { background: linear-gradient(180deg, #6366F1, #4F46E5); color: #fff; border-bottom-right-radius: var(--radius-sm); }
.chat-msg.ai .bubble { background: var(--color-bg-card); border: 1px solid var(--color-border); border-bottom-left-radius: var(--radius-sm); box-shadow: var(--shadow-sm); }
.chat-msg.ai .bubble .source-link { font-size: 12px; color: var(--color-primary); margin-top: 6px; display: block; }
.chat-input-bar {
  position: sticky; bottom: 0;
  left: 0; right: 0; padding: 8px 12px;
  background: var(--color-bg-card); border-top: 1px solid var(--color-border);
  display: flex; gap: 8px; z-index: 10;
}
.chat-input {
  flex: 1; height: 44px; padding: 0 14px;
  background: var(--color-bg-hover); border: 1.5px solid transparent;
  border-radius: var(--radius-full); font-size: 14px; outline: none;
  font-family: inherit; color: var(--color-text-primary);
}
.chat-input::placeholder { color: var(--color-text-disabled); }
.chat-input:focus { border-color: var(--color-primary); background: #fff; }
.chat-send {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: linear-gradient(180deg, #6366F1, #4F46E5); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(79,70,229,0.3); flex-shrink: 0;
}
.typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
.typing-indicator span {
  width: 6px; height: 6px; background: var(--color-text-tertiary);
  border-radius: 50%; animation: typing 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

/* ── Toast ─────────────────────────────────────────────────────────── */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: var(--color-text-primary); color: #fff; padding: 10px 20px;
  border-radius: var(--radius-lg); font-size: 14px; z-index: 999;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* ── Modal ─────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
}
.modal-sheet {
  background: var(--color-bg-card); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  padding: 20px 16px calc(20px + var(--safe-bottom)); width: 100%;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--color-text-primary); }
.modal-input {
  width: 100%; height: 44px; padding: 0 14px;
  background: var(--color-bg-hover); border: 1.5px solid transparent;
  border-radius: var(--radius-lg); font-size: 14px; outline: none; margin-bottom: 16px;
  font-family: inherit; color: var(--color-text-primary);
}
.modal-input::placeholder { color: var(--color-text-disabled); }
.modal-input:focus { border-color: var(--color-primary); background: #fff; }
.modal-actions { display: flex; gap: 12px; }
.modal-actions .btn { flex: 1; }

/* ── Audio Player ──────────────────────────────────────────────────── */
.audio-player {
  position: sticky; top: 0; z-index: 50;
  background: var(--color-bg-card); border-bottom: 1px solid var(--color-border);
  padding: 10px 16px; box-shadow: var(--shadow-sm);
}
.audio-player audio { width: 100%; height: 36px; }
.audio-player .player-hint {
  font-size: 11px; color: var(--color-text-tertiary); text-align: center; margin-top: 4px;
}

/* Transcript clickable */
.transcript-item { cursor: pointer; padding: 4px 0; border-radius: var(--radius-sm); transition: background 0.15s; }
.transcript-item:active { background: var(--color-primary-light); }
.transcript-item.playing { background: #EEF2FF; border-left: 3px solid var(--color-primary); padding-left: 8px; }

/* ── Profile / 我的 ────────────────────────────────────────────────── */
.profile-section { padding: 16px; }
.profile-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
}
.profile-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--color-primary), #818CF8);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; color: #fff;
}
.profile-name { font-size: 18px; font-weight: 600; }
.profile-sub { font-size: 13px; color: var(--color-text-tertiary); }
.profile-stats {
  display: flex; gap: 12px; margin-bottom: 24px;
}
.stat-card {
  flex: 1; background: var(--color-bg-card); border-radius: var(--radius-md);
  padding: 14px; text-align: center; box-shadow: var(--shadow-sm);
}
.stat-num { font-size: 22px; font-weight: 700; color: var(--color-primary); }
.stat-label { font-size: 12px; color: var(--color-text-tertiary); margin-top: 2px; }
.profile-menu-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: var(--color-bg-card); border-radius: var(--radius-md);
  margin-bottom: 8px; box-shadow: var(--shadow-sm); cursor: pointer;
}
.profile-menu-item svg { width: 20px; height: 20px; color: var(--color-text-secondary); flex-shrink: 0; }
.profile-menu-item span { flex: 1; font-size: 14px; }
.profile-menu-item .arrow { flex: none; color: var(--color-text-tertiary); font-size: 16px; }

/* ── Skeleton ──────────────────────────────────────────────────────── */
.skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="top-nav">
  <h1><span>Voice</span>KB</h1>
  <div id="navRight"></div>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Views — 内部容器滚动，不触发浏览器地址栏收缩 -->
<div class="view-container">
  <div id="viewHome" class="view active"></div>
  <div id="viewDetail" class="view"></div>
  <div id="viewChat" class="view"></div>
  <div id="viewProfile" class="view"></div>
</div>

<!-- FAB Upload Button — label 直接关联 input，避免 JS .click() 在移动端被拦截 -->
<label class="btn btn-primary btn-fab" id="fabUpload" for="fileInput">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</label>

<!-- File input -->
<input type="file" id="fileInput" accept="audio/*,.wav,.mp3,.m4a,.flac,.ogg,.wma,.aac,.opus" onchange="handleFileSelect(this.files[0])" style="display:none">

<!-- Bottom Tab Bar -->
<nav class="tab-bar">
  <button class="tab-item active" data-view="viewHome" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>
    <span>录音</span>
  </button>
  <button class="tab-item" data-view="viewChat" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    <span>问答</span>
  </button>
  <button class="tab-item" data-view="viewProfile" onclick="switchTab(this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>我的</span>
  </button>
</nav>

<script>
/* ── State ──────────────────────────────────────────────────────────── */
const API = '';  // same origin
let currentView = 'viewHome';
let recordings = [];
let currentRecording = null;

/* ── Tab Navigation ────────────────────────────────────────────────── */
function switchTab(el) {
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const viewId = el.dataset.view;
  if (viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    currentView = viewId;
    if (viewId === 'viewHome') loadRecordings();
    if (viewId === 'viewChat') initChatView();
    if (viewId === 'viewProfile') initProfileView();
  }
  document.getElementById('fabUpload').classList.toggle('hidden', viewId !== 'viewHome');
}

/* ── Toast ──────────────────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── API Helpers ────────────────────────────────────────────────────── */
async function api(path, opts = {}) {
  const resp = await fetch(API + path, opts);
  if (!resp.ok) throw new Error(`API ${resp.status}`);
  return resp.json();
}

/* ── Home View: 搜索 + 录音列表 ───────────────────────────────────── */
async function loadRecordings() {
  const view = document.getElementById('viewHome');
  try {
    recordings = await api('/api/recordings');

    // 搜索栏 + 结果/列表容器
    const searchBar = `
      <div class="search-bar">
        <input class="search-input" id="homeSearchInput" placeholder="搜索录音内容..." oninput="debounceHomeSearch()">
      </div>`;

    if (recordings.length === 0) {
      view.innerHTML = `
        ${searchBar}
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>

let homeSearchTimer;
function debounceHomeSearch() {
  clearTimeout(homeSearchTimer);
  homeSearchTimer = setTimeout(doHomeSearch, 400);
}

async function doHomeSearch() {
  const q = document.getElementById('homeSearchInput')?.value?.trim();
  const resultsDiv = document.getElementById('homeSearchResults');
  const listDiv = document.getElementById('homeRecordingList');
  if (!resultsDiv || !listDiv) return;

  if (!q) {
    resultsDiv.classList.add('hidden');
    listDiv.classList.remove('hidden');
    return;
  }

  try {
    const results = await api(`/api/search?q=${encodeURIComponent(q)}&type=hybrid`);
    listDiv.classList.add('hidden');
    resultsDiv.classList.remove('hidden');

    if (results.length === 0) {
      resultsDiv.innerHTML = '<div class="card" style="text-align:center;color:var(--color-text-tertiary)">没有找到相关内容</div>';
      return;
    }
    resultsDiv.innerHTML = results.map(r => {
      const text = r.segment.text.replace(
        new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'),
        '<mark class="search-highlight">$1</mark>'
      );
      return `
        <div class="search-result-item" onclick="openRecording('${r.recording_id}')">
          <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:3px">${r.recording_filename} · ${r.segment.speaker_id}</div>
          <div style="font-size:14px;line-height:1.6">${text}</div>
        </div>`;
    }).join('');
  } catch(e) {
    resultsDiv.innerHTML = '<div class="card">搜索出错</div>';
    resultsDiv.classList.remove('hidden');
  }
}

function renderRecordingCard(r) {
  const date = new Date(r.created_at).toLocaleDateString('zh-CN', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const dur = r.duration ? `${Math.floor(r.duration/60)}分${Math.floor(r.duration%60)}秒` : '处理中';
  const statusClass = r.status;
  const statusText = {pending:'等待中', processing:'处理中', completed:'已完成', failed:'失败'}[r.status] || r.status;
  const speakers = (r.speakers||[]).map((s,i) => `<span class="speaker-tag">${s}</span>`).join('');

  return `
    <div class="card rec-card" onclick="openRecording('${r.id}')">
      <div class="rec-header">
        <div class="rec-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
            <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          </svg>
        </div>
        <div class="rec-info">
          <div class="rec-name">${r.title || r.filename}</div>
          <div class="rec-meta">${date} · ${dur} <span class="rec-status ${statusClass}">${statusText}</span></div>
        </div>
      </div>
      ${speakers ? `<div class="rec-speakers">${speakers}</div>` : ''}
    </div>`;
}

async function handleFileSelect(file) {
  if (!file) return;
  const view = document.getElementById('viewHome');

  // Show progress
  view.innerHTML = `
    <div class="card">
      <div class="card-title">上传中: ${file.name}</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="uploadBar" style="width:0%"></div></div>
      <div class="progress-text" id="uploadText">上传中...</div>
    </div>`;

  try {
    const fd = new FormData();
    fd.append('file', file);
    const resp = await fetch(API + '/api/upload', {method:'POST', body:fd});
    if (!resp.ok) throw new Error('Upload failed');
    const data = await resp.json();

    showToast('上传成功，开始处理');
    watchProgress(data.recording_id);
  } catch(e) {
    showToast('上传失败: ' + e.message);
    loadRecordings();
  }
}

function watchProgress(recId) {
  const view = document.getElementById('viewHome');
  view.innerHTML = `
    <div class="card">
      <div class="card-title">处理中...</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="procBar" style="width:0%"></div></div>
      <div class="progress-text" id="procText">准备中...</div>
    </div>`;

  // Poll progress
  const poll = setInterval(async () => {
    try {
      const status = await api(`/api/recordings/${recId}/status`);
      const bar = document.getElementById('procBar');
      const text = document.getElementById('procText');
      if (bar) bar.style.width = Math.max(0, status.percent) + '%';
      if (text) text.textContent = `${status.step} (${Math.max(0, status.percent)}%)`;

      if (status.percent >= 100 || status.percent < 0) {
        clearInterval(poll);
        if (status.percent >= 100) {
          showToast('处理完成！');
          setTimeout(() => openRecording(recId), 500);
        } else {
          showToast('处理失败');
          loadRecordings();
        }
      }
    } catch(e) { /* continue polling */ }
  }, 1500);

  // Also try WebSocket
  try {
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${wsProto}//${location.host}/ws/progress/${recId}`);
    ws.onmessage = (e) => {
      const status = JSON.parse(e.data);
      const bar = document.getElementById('procBar');
      const text = document.getElementById('procText');
      if (bar) bar.style.width = Math.max(0, status.percent) + '%';
      if (text) text.textContent = `${status.step} (${Math.max(0, status.percent)}%)`;
    };
  } catch(e) { /* WebSocket not critical, polling is backup */ }
}

async function openRecording(recId) {

  document.getElementById('fabUpload').classList.add('hidden');

  try {

    currentRecording = rec;
    renderDetail(rec);
  } catch(e) {
    view.innerHTML = '<div class="card"><p>加载失败</p></div>';
  }
}

function renderDetail(rec) {
  const view = document.getElementById('viewDetail');
  const dur = `${Math.floor(rec.duration/60)}分${Math.floor(rec.duration%60)}秒`;
  const date = new Date(rec.created_at).toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});

  const speakerColors = {};
  let colorIdx = 0;
  (rec.speakers||[]).forEach(s => { speakerColors[s] = colorIdx++; });

  const segments = (rec.segments||[]).map((seg, idx) => {
    const ci = speakerColors[seg.speaker_id] ?? 0;
    const ts = `${String(Math.floor(seg.start/60)).padStart(2,'0')}:${String(Math.floor(seg.start%60)).padStart(2,'0')}`;
    const initial = seg.speaker_id.charAt(0) || 'S';
    return `
      <div class="transcript-item" data-start="${seg.start}" data-end="${seg.end}" data-idx="${idx}" onclick="seekAudio(${seg.start}, ${idx})">
        <div class="transcript-avatar spk-${ci % 5}">${initial}</div>
        <div class="transcript-bubble">
          <div class="transcript-speaker">
            <span class="speaker-tag" onclick="event.stopPropagation();showRenameModal('${seg.speaker_id}')" style="padding:1px 6px;font-size:11px">${seg.speaker_id}</span>
            <span class="ts">${ts}</span>
          </div>
          <div class="transcript-text">${seg.text}</div>
        </div>
      </div>`;
  }).join('');

  view.innerHTML = `
    <div class="detail-header">
      <div class="detail-back" onclick="backToList()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div style="flex:1">
          <div class="detail-title">${rec.title || rec.filename}</div>
          <div class="detail-meta">${date} · ${dur} · ${(rec.speakers||[]).join(', ')}</div>
        </div>
        <button onclick="showRecordingMenu('${rec.id}')" style="border:none;background:none;padding:4px 8px;cursor:pointer;color:var(--color-text-tertiary);font-size:20px">···</button>
      </div>
    </div>
    <div class="audio-player">
      <audio id="audioPlayer" controls preload="metadata" src="/api/recordings/${rec.id}/audio"></audio>
      <div class="player-hint">点击对话文字可跳转播放对应片段</div>
    </div>
    ${rec.summary ? `
      <div class="summary-card">
        <h4>会议摘要</h4>
        <div class="summary-text">${rec.summary.replace(/\n/g, '<br>')}</div>
      </div>` : ''}
    <div style="padding:0 16px;margin-bottom:12px">
      <div style="font-size:15px;font-weight:600">对话记录</div>
    </div>
    <div class="transcript">${segments}</div>`;

  // 音频播放时自动高亮当前片段
  const audio = document.getElementById('audioPlayer');
  if (audio) {
    audio.addEventListener('timeupdate', () => {
      const t = audio.currentTime;
      document.querySelectorAll('.transcript-item').forEach(el => {
        const start = parseFloat(el.dataset.start);
        const end = parseFloat(el.dataset.end);
        if (t >= start && t < end) {
          if (!el.classList.contains('playing')) {
            document.querySelectorAll('.transcript-item.playing').forEach(e => e.classList.remove('playing'));
            el.classList.add('playing');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }
      });
    });
  }
}

function seekAudio(startTime, idx) {
  const audio = document.getElementById('audioPlayer');
  if (audio) {
    audio.currentTime = startTime;
    audio.play();
    // 高亮当前片段
    document.querySelectorAll('.transcript-item.playing').forEach(e => e.classList.remove('playing'));
    const item = document.querySelector(`.transcript-item[data-idx="${idx}"]`);
    if (item) item.classList.add('playing');
  }
}

/* ── Chat View — 多轮对话 + 历史持久化 ─────────────────────────────── */
let chatConversationId = 'default';
let chatInitialized = false;

async function initChatView() {
  const view = document.getElementById('viewChat');

  // 已初始化过，只需滚到底部，不重建 DOM
  if (chatInitialized) {
    const msgs = document.getElementById('chatMessages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
    return;
  }

  view.innerHTML = `
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-bar">
      <input class="chat-input" id="chatInput" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter')sendChat()">
      <button class="chat-send" onclick="sendChat()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>`;

  // 加载历史对话
  const msgs = document.getElementById('chatMessages');
  try {
    const history = await api(`/api/chat/history?conversation_id=${chatConversationId}&limit=50`);
    if (history.length === 0) {
      msgs.innerHTML = `<div class="chat-msg ai"><div class="bubble">\u4f60\u597d\uff01\u6211\u662f VoiceKB \u667a\u80fd\u52a9\u624b\u3002\n\u4f60\u53ef\u4ee5\u8ddf\u6211\u95f2\u804a\uff0c\u4e5f\u53ef\u4ee5\u95ee\u5f55\u97f3\u76f8\u5173\u7684\u95ee\u9898\uff0c\u6bd4\u5982\u201c\u9884\u7b97\u662f\u600e\u4e48\u5206\u914d\u7684\uff1f\u201d</div></div>`;
    } else {
      history.forEach(m => {
        const cls = m.role === 'user' ? 'user' : 'ai';
        let html = m.content.replace(/\n/g, '<br>');
        msgs.innerHTML += `<div class="chat-msg ${cls}"><div class="bubble">${html}</div></div>`;
      });
    }
  } catch(e) {
    msgs.innerHTML = `<div class="chat-msg ai"><div class="bubble">\u4f60\u597d\uff01\u6709\u4ec0\u4e48\u53ef\u4ee5\u5e2e\u4f60\u7684\uff1f</div></div>`;
  }
  // 延迟滚动，等 DOM 渲染完毕
  requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight; });
  chatInitialized = true;
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';

  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML += `<div class="chat-msg user"><div class="bubble">${q}</div></div>`;
  msgs.innerHTML += `<div class="chat-msg ai" id="chatLoading"><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>`;
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const result = await api('/api/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question: q, conversation_id: chatConversationId}),
    });

    document.getElementById('chatLoading')?.remove();

    let html = result.answer.replace(/\n/g, '<br>');
    if (result.sources?.length) {
      html += '<br><span class="source-link">来源: ';
      const seen = new Set();
      result.sources.forEach(s => {
        if (!seen.has(s.recording_id)) {
          seen.add(s.recording_id);
          html += `<a href="#" onclick="openRecording('${s.recording_id}');return false">${s.recording_filename}</a> `;
        }
      });
      html += '</span>';
    }

    msgs.innerHTML += `<div class="chat-msg ai"><div class="bubble">${html}</div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
  } catch(e) {
    document.getElementById('chatLoading')?.remove();
    msgs.innerHTML += `<div class="chat-msg ai"><div class="bubble">抱歉，出了点问题，请稍后再试。</div></div>`;
  }
}

  modal.className = 'modal-overlay';
  modal.id = 'renameModal';
  const list = speakers.map(s => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--color-border)">
      <div>
        <div style="font-weight:500">${s.name}</div>
        <div style="font-size:12px;color:var(--color-text-tertiary)">${s.recording_ids.length} 条录音</div>
      </div>
      <button class="btn btn-sm btn-outline" onclick="closeModal();showRenameModal('${s.name}')">重命名</button>
    </div>
  `).join('');

  modal.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-title">说话人管理 (${speakers.length})</div>
      <div style="max-height:60vh;overflow-y:auto">${list || '<p style="color:var(--color-text-tertiary)">暂无已注册的说话人</p>'}</div>
      <div class="modal-actions" style="margin-top:16px">
        <button class="btn btn-primary btn-block" onclick="closeModal()">关闭</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

/* ── 后台恢复 — 手机切回前台时自动刷新状态 ──────────────────────────── */
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    console.log('Page resumed from background');
    // 恢复当前视图的数据
    if (currentView === 'viewHome') {
      loadRecordings();
    } else if (currentView === 'viewDetail' && currentRecording) {
      // 重新加载详情（可能处理已完成）
      openRecording(currentRecording.id);
    }
    // 如果有正在处理的录音，检查是否已完成
    checkProcessingRecordings();
  }
});

async function checkProcessingRecordings() {
  try {
    const recs = await api('/api/recordings');
    const processing = recs.filter(r => r.status === 'processing');
    if (processing.length > 0) {
      // 有录音还在处理，继续轮询
      processing.forEach(r => {
        watchProgress(r.id);
      });
    }
    // 如果之前在等处理，现在完成了，刷新列表
    const view = document.getElementById('viewHome');
    if (view.classList.contains('active') && view.querySelector('.progress-bar-bg')) {
      const allDone = recs.every(r => r.status !== 'processing');
      if (allDone) {
        loadRecordings();
        showToast('处理已完成');
      }
    }
  } catch(e) { /* ignore */ }
}

/* ── 键盘弹出适配 — 解决输入法首次遮挡输入框 ──────────────────────── */
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    // 键盘弹出时 visualViewport.height 变小
    const vvh = window.visualViewport.height;
    const offset = window.innerHeight - vvh;
    // 调整 view-container 高度，让 sticky 的输入框露出来
    const container = document.querySelector('.view-container');
    if (container) {
      container.style.height = offset > 50 ? `${vvh - 46}px` : '';  // 46 = top-nav height
    }
    // 滚动 chat 到底部
    if (offset > 50) {
      const msgs = document.getElementById('chatMessages');
      if (msgs) setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 50);
    }
  });
}

/* ── Init ───────────────────────────────────────────────────────────── */
loadRecordings();
</script>
</body>
</html>
